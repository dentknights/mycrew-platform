version: '3.8'

services:
  # MyCrew Next.js App
  mycrew:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mycrew-app
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mycrew:${DB_PASSWORD}@postgres:5432/mycrew?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://100.98.72.30:3005
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - WS_URL=ws://100.98.72.30:3006
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - mycrew-network
    volumes:
      - ./uploads:/app/uploads

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mycrew-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mycrew
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=mycrew
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mycrew-network

  # Redis for caching & real-time
  redis:
    image: redis:7-alpine
    container_name: mycrew-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"
    networks:
      - mycrew-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: mycrew-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mycrew-network

  # WebSocket server for live streaming
  websocket:
    build:
      context: ./websocket
      dockerfile: Dockerfile
    container_name: mycrew-websocket
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3006
    depends_on:
      - redis
    networks:
      - mycrew-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: mycrew-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - mycrew
      - minio
    networks:
      - mycrew-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  mycrew-network:
    driver: bridge
